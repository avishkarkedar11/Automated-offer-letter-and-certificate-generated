<!DOCTYPE html>
<html>
<head>
    <title>Edit Candidate</title>
</head>
<body>

<h1>Edit Candidate</h1>

<form method="POST">

    <input type="text"
           name="full_name"
           value="{{ candidate[1] }}"
           required><br><br>

    <input type="email"
           name="email"
           value="{{ candidate[2] }}"
           required><br><br>

    <input type="text"
           name="college"
           value="{{ candidate[3] }}"
           required><br><br>

    <input type="text"
           name="role_name"
           value="{{ candidate[4] }}"
           required><br><br>

    <input type="date"
           name="joining_date"
           value="{{ candidate[5] }}"
           required><br><br>

    <input type="text"
           name="company_name"
           value="{{ candidate[6] }}"
           required><br><br>

    <input type="text"
           name="stipend"
           value="{{ candidate[7] }}"
           required><br><br>

    <input type="text"
           name="duration"
           value="{{ candidate[8] }}"
           required><br><br>

    <button type="submit">
        Update Candidate
    </button>

</form>

</body>
</html>
