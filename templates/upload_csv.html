<!DOCTYPE html>
<html>
<head>
    <title>Upload CSV</title>
</head>
<body>

<h1>Bulk Candidate Upload</h1>

<form method="POST" enctype="multipart/form-data">

    <input type="file"
           name="csv_file"
           accept=".csv"
           required>

    <br><br>

    <button type="submit">
        Upload CSV
    </button>

</form>

</body>
</html>
