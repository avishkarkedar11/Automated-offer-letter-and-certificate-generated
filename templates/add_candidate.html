<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Candidate | Horyzen Technologies</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="/static/logo.jpg" alt="Horyzen Technologies" class="sidebar-logo">
            <div>
                <h2 class="sidebar-title">HORYZEN</h2>
                <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Technologies</span>
            </div>
        </div>

        <ul class="sidebar-menu">
            <li>
                <a href="/" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0110.089 18H8.25c-.621 0-1.125-.504-1.125-1.125v-1.5c0-.621.504-1.125 1.125-1.125h.884" />
                    </svg>
                    <span>Candidates</span>
                </a>
            </li>
            <li>
                <a href="/add" class="sidebar-link active">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 019.375 21h-1.5A12.318 12.318 0 014 19.235z" />
                    </svg>
                    <span>Add Candidate</span>
                </a>
            </li>
            <li>
                <a href="/upload-csv" class="sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5h10.5a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0017.25 4.5H6.75A2.25 2.25 0 004.5 6.75v10.5a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                    <span>Bulk Upload CSV</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="/logout" class="sidebar-link" style="color: var(--accent-danger);">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 20px; height: 20px;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
                </svg>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="header-container" style="margin-bottom: 1.5rem;">
            <div class="header-title">
                <h1>Add Candidate</h1>
                <p>Register a new candidate for offer and certificate generation</p>
            </div>
            <a href="/" class="btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 16px; height: 16px; transform: scaleX(-1);">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
                </svg>
                Back to Dashboard
            </a>
        </header>

        <div class="glass-card form-container">
            <div class="form-header">
                <h2>Candidate Details</h2>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem;">Please fill out all the fields below accurately</p>
            </div>

            <form method="POST">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label" for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" class="form-control" placeholder="e.g. John Doe" required>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="e.g. john.doe@example.com" required>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label" for="college">College / University</label>
                        <input type="text" id="college" name="college" class="form-control" placeholder="e.g. Stanford University" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="role_name">Role / Designation</label>
                        <input type="text" id="role_name" name="role_name" class="form-control" placeholder="e.g. Software Engineer Intern" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="joining_date">Joining Date</label>
                        <input type="date" id="joining_date" name="joining_date" class="form-control" required>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label" for="company_name">Company Name</label>
                        <input type="text" id="company_name" name="company_name" class="form-control" placeholder="e.g. Horyzen Technologies" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="stipend">Monthly Stipend (₹)</label>
                        <input type="text" id="stipend" name="stipend" class="form-control" placeholder="e.g. 15000" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="duration">Internship Duration</label>
                        <input type="text" id="duration" name="duration" class="form-control" placeholder="e.g. 6 Months" required>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/" class="btn-secondary" style="padding: 0.75rem 1.25rem;">Cancel</a>
                    <button type="submit" class="btn-primary">
                        Save Candidate
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
