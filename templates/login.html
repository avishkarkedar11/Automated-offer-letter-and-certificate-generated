<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Horyzen Technologies</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

<div class="glass-card login-card">
    <div class="login-logo-container">
        <img src="/static/logo.jpg" alt="Horyzen Technologies" class="login-logo">
        <h2 class="login-brand-title">HORYZEN</h2>
        <p class="login-brand-subtitle">Technologies</p>
    </div>

    {% if error %}
        <div class="login-error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        <div style="margin-bottom: 1.25rem;">
            <label class="form-label" for="email">Admin Email</label>
            <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="email@horyzen.com"
                required>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label class="form-label" for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="••••••••"
                required>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">
            Access Dashboard
        </button>
    </form>
</div>

</body>
</html>
